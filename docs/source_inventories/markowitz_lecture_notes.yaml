  created_by: "audit-first-harness source intake (this milestone; human-reviewed before any promotion)"
  created_date: "2026-06-29"
  content_bearing: true
  notes: >-
    Triage only — no result here is proved, mapped, or verified. The central source-fidelity decision
    is the probabilistic/algebraic ABSTRACTION BOUNDARY: the recommended first pass formalises the
    algebraic layer (Sigma a given SPD matrix) and defers the probabilistic layer (MK-001/MK-002) and
    the equilibrium layer (MK-011). Promoting any candidate into a source-formalisation record /
