assumptions:
  explicit:
    - "Sigma in R^{n x n} is symmetric positive definite (given)"
    - "budget constraint w^T 1 = 1"
    - "short selling allowed: w_i may be negative (w in R^n, sign-unconstrained)"
  implicit:
    - "n is finite and n > 0 (nonempty index set), so the ones vector 1 is nonzero"
    - "Sigma is invertible (consequence of positive definiteness)"
  derived_or_standard:
    - "Sigma^{-1} exists and is symmetric positive definite"
  intentionally_not_assumed:
    - "the probabilistic construction Sigma = Cov(R) and mu = E[R] (deferred to MK-001/MK-002)"
    - "any particular value of, or constraint on, the target return m"
    - "positivity of C, B, D (that is MK-003, not part of the scaffolding)"

