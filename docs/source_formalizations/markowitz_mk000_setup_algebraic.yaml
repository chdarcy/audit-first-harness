source:
  source_id: "markowitz_lecture_notes"
  source_file: "examples/markowitz_lecture_notes/source.tex"
  source_ref: "MK-000-setup-algebraic"
  source_span: "Sec.1-Sec.2 (def Portfolio; def Portfolio return/mean/variance; def Markowitz problem)"
  source_kind: "lecture_notes"
  # raw_excerpt holds ONLY verbatim spans copied from examples/markowitz_lecture_notes/source.tex
  # (source line breaks preserved; blank lines separate spans). Spans, in order, are source lines
  # 136-139 (Portfolio/budget/short-selling), 146-147 (mean/variance), 173-175 (Markowitz problem),
  # 197-199 (A,B,C definitions), and the sentence "Let $D := BC - A^2$." from line 240 (D definition).
  raw_excerpt: |
    A \emph{portfolio} is a vector of weights $\bw = (w_1,\dots,w_n)\T \in \R^n$
    satisfying the budget constraint $\bw\T \one = \sum_{i=1}^n w_i = 1$, where
    $w_i$ is the fraction of wealth invested in asset $i$. We allow $w_i < 0$
    (short selling).

    \mu_{\bw} := \E[R_{\bw}] = \bw\T \bmu, \qquad
    \sigma_{\bw}^2 := \Var(R_{\bw}) = \bw\T \bSigma \bw .

    \min_{\bw \in \R^n} \ \tfrac{1}{2}\, \bw\T \bSigma \bw
    \quad \text{subject to} \quad
    \bw\T \bmu = m, \quad \bw\T \one = 1 .

    A &:= \one\T \bSigma^{-1} \bmu, \\
    B &:= \bmu\T \bSigma^{-1} \bmu, \\
    C &:= \one\T \bSigma^{-1} \one .

    Let $D := BC - A^2$.

informal_claim:
  title: "Algebraic scaffolding for mean-variance portfolio optimisation"
  statement: >-
    Over a GIVEN real symmetric positive-definite matrix Sigma in R^{n x n} and vectors mu, 1 in R^n:
    a portfolio is a weight vector w in R^n satisfying the budget constraint w^T 1 = 1 (short selling
    allowed, i.e. w_i may be negative); its mean is mu_w = w^T mu and its variance is
    sigma_w^2 = w^T Sigma w; the scalars are A = 1^T Sigma^{-1} mu, B = mu^T Sigma^{-1} mu,
    C = 1^T Sigma^{-1} 1, D = BC - A^2; and the Markowitz problem with target m minimises
    (1/2) w^T Sigma w subject to w^T mu = m and w^T 1 = 1.
  proof_context: >-
    Sections 1-2 of the source. The probabilistic ORIGIN of Sigma (Sigma = Cov of L^2 returns, Sec.1)
    is deliberately DEFERRED; this record sits on the algebraic side of the abstraction boundary.
  theorem_role: "setup"

