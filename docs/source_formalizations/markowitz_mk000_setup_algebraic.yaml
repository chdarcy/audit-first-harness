    A coherent algebraic setting - a fixed dimension n, a given SPD matrix Sigma, vectors mu and 1, a
    portfolio with its budget constraint, the mean and variance maps, the scalars A/B/C/D, and the
    Markowitz target-m problem - in which the frontier results can later be stated and proved.
