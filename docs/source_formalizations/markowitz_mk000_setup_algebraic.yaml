ambiguities:
  - issue: "the ones vector 1 vs the scalar 1"
    risk: "the budget constraint w^T 1 = 1 mixes the ones vector (LHS) and the scalar 1 (RHS); conflating them is a fidelity error"
    resolution: "treat 1 as the all-ones vector in R^n on the LHS and the real number 1 on the RHS"
    status: "resolved"
  - issue: "Sigma as probabilistic covariance vs algebraic SPD matrix"
    risk: "the same symbol carries two readings across the abstraction boundary"
    resolution: "formalise Sigma as a given SPD matrix here; defer the probabilistic construction (MK-001/MK-002)"
    status: "resolved"
  - issue: "transpose / matrix notation vs the Lean representation"
    risk: "the source uses w^T, Sigma^{-1}, 1^T Sigma^{-1} mu; the Lean choice (Mathlib Matrix/vector vs an abstract inner-product / PD bilinear form) is not settled and affects every downstream statement"
    resolution: "defer the representation decision to MK-003 (recorded there as needs_human_review)"
    status: "needs_human_review"
  - issue: "whether to include the (1/2) objective normalisation"
    risk: "harmless scaling, but it must be carried consistently into any first-order conditions"
    resolution: "keep the (1/2) exactly as the source states it"
    status: "resolved"

