ambiguities:
  - issue: "boundary between the source-facing Markowitz statement and an abstract proof helper"
    risk: >-
      if the public theorem were stated only as an abstract inner-product inequality it would lose
      Markowitz source fidelity; conversely the proof should still be free to reuse an abstract helper
      lemma. The two must be kept distinct.
    resolution: >-
      Source-facing theorem stays Markowitz-shaped (Sigma / mu / 1 / A / B / C / D over R^n); the
      abstract '<x,x> <y,y> - <x,y>^2 > 0 for linearly independent x, y' lemma is recorded as a
      PROPOSED proof helper to instantiate (x = mu, y = 1), not as the public statement. The exact
      helper shape and Mathlib API still need a human decision.
    status: "needs_human_review"
  - issue: "deriving B > 0 from the non-proportionality hypothesis"
    risk: >-
      B = mu^T Sigma^{-1} mu > 0 holds iff mu != 0 (Sigma^{-1} positive definite). Mathematically
      'mu not proportional to the ones vector' ALREADY implies mu != 0, because 0 is proportional to
      every vector (0 = 0 . 1); so B > 0 follows from non-proportionality plus positive-definiteness
      of Sigma^{-1}. The remaining risk is purely FORMAL: the Lean rendering of 'not proportional to
      1' must be strong enough to discharge mu != 0 (e.g. NOT (exists c, mu = c . 1) gives mu != 0 by
      taking c = 0), and the dimension must be nonempty (n > 0) so the ones vector is itself nonzero.
    resolution: >-
      Mathematically settled (non-proportionality => mu != 0 => B > 0). Open only as a Lean-encoding
      check: confirm the chosen formal statement of non-proportionality discharges mu != 0, under n > 0.
    status: "needs_human_review"
  - issue: "the exact strict Cauchy-Schwarz equality condition available in Mathlib"
    risk: "strict A^2 < BC depends on the 'equality iff linearly dependent' characterisation; the precise Mathlib lemma form must match the source argument"
    resolution: "use Mathlib's inner-product Cauchy-Schwarz plus its equality case; confirm the exact lemma during formalisation"
    status: "unresolved"
  - issue: "whether the 2x2 dual-system uniqueness belongs inside MK-003"
    risk: "the source states it within Lemma D; including it widens the target beyond positivity"
    resolution: "split off into a separate later record; MK-003 covers C/B/D positivity only"
    status: "resolved"

