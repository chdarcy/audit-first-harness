    Set up the Sigma^{-1}-weighted inner product, derive the three positivity facts, then strengthen
    Cauchy-Schwarz to a strict inequality using non-proportionality, and conclude D > 0. The strict
    step may optionally be factored through a reusable ABSTRACT helper lemma ('<x,x> <y,y> - <x,y>^2 >
    0 for linearly independent x, y') instantiated at x = mu, y = 1 (see formalization_choices). (NOTE:
    this is a PROPOSED decomposition only - no step is proved or implemented here.)
  subtargets:
    - id: "ip-pd"
      informal_goal: "define <x,y> = x^T Sigma^{-1} y and show it is a positive-definite inner product (from Sigma^{-1} SPD)"
      depends_on: []
      proposed_lean_declaration: ""
    - id: "C-pos"
      informal_goal: "C = <1,1> > 0 (since the ones vector is nonzero)"
      depends_on: ["ip-pd"]
      proposed_lean_declaration: ""
    - id: "mu-nonzero"
      informal_goal: "mu != 0, derived from 'mu not proportional to 1' (0 is proportional to every vector)"
      depends_on: []
      proposed_lean_declaration: ""
    - id: "B-pos"
      informal_goal: "B = <mu,mu> > 0 (from mu != 0 via subtarget mu-nonzero, and Sigma^{-1} positive definite)"
      depends_on: ["ip-pd", "mu-nonzero"]
      proposed_lean_declaration: ""
    - id: "cs-le"
      informal_goal: "A^2 = <mu,1>^2 <= <mu,mu> <1,1> = BC by Cauchy-Schwarz"
      depends_on: ["ip-pd"]
      proposed_lean_declaration: ""
    - id: "cs-strict"
      informal_goal: "strengthen to A^2 < BC using non-proportionality (Cauchy-Schwarz equality case)"
      depends_on: ["cs-le"]
      proposed_lean_declaration: ""
    - id: "D-pos"
      informal_goal: "conclude D = BC - A^2 > 0"
      depends_on: ["cs-strict"]
      proposed_lean_declaration: ""
    - id: "dual-invertibility-consequence"
      informal_goal: >-
        NOTE ONLY (NOT part of MK-003): D > 0 implies D != 0, hence the 2x2 dual system is invertible
        with a unique (lambda, gamma). The uniqueness/invertibility THEOREM itself is a SEPARATE later
        target, deliberately split off; MK-003 establishes only C > 0, B > 0, D > 0.
      depends_on: ["D-pos"]
      proposed_lean_declaration: ""

