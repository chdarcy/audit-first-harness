informal_claim:
  title: "Discriminant positivity (Lemma D)"
  statement: >-
    For a real symmetric positive-definite matrix Sigma in R^{n x n} and vectors mu, 1 in R^n with mu
    NOT a scalar multiple of the ones vector 1, define A = 1^T Sigma^{-1} mu, B = mu^T Sigma^{-1} mu,
    C = 1^T Sigma^{-1} 1, and D = BC - A^2. Then C > 0, B > 0, and D > 0 (strict).
  proof_context: >-
    Uses that Sigma^{-1} is symmetric positive definite, the Sigma^{-1}-weighted inner product
    <x,y> := x^T Sigma^{-1} y, and the STRICT Cauchy-Schwarz inequality (equality iff mu and 1 are
    linearly dependent). The source bundles the consequent uniqueness of the 2x2 dual system into the
    same lemma; here that uniqueness is split off (see ambiguities / proof_decomposition).
  theorem_role: "lemma"

