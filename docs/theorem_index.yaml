        There is NO Lean declaration, NO formal proof, NO formal_mapping.yaml entry, NO Comparator
        artifact, NO source-fidelity judge package, and NO promotion gate has run for this target.
        Proposed (NOT created) future formal-mapping target name MarkowitzLemmaDPositive (proposed Lean
        module AuditHarness.MarkowitzLemmaDPositive / declaration markowitz_lemma_D_positive) -- a
        formal_mapping entry is deferred because validate_mapping.py requires an existing Lean
        declaration, Comparator config, and review file (no draft/unimplemented mapping state exists
        yet). Preserved decisions: the public source-facing theorem stays Markowitz-shaped
        (finite-dim real vectors + Sigma + mu + ones + A/B/C/D); the abstract real-inner-product /
