          (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let B := őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := B * C - A ^ 2;
          0 < B ‚ąß 0 < D ‚ąß 0 < C
    note: "the three positivity conjuncts are reordered to 0 < B ‚ąß 0 < D ‚ąß 0 < C (‚ąß is commutative and associative); the statement is unchanged"

  - id: MLDP-C3
