# Mutation test cases for the MarkowitzLemmaDPositive target.
#
# Textual judge test cases; not compiled. Expected labels are fixed before any judge run.
#   discriminative -> judge must REJECT (FAIL or WARN)
#   consistency    -> judge must ACCEPT (PASS / PASS_EQUIV / PASS_PROVABLE_EQUIV)
#
# Source lemma (lem:D): with the covariance ő£ (written S, since ő£ is reserved in Lean) symmetric
# positive-definite and őľ not proportional to the all-ones vector 1, define A = 1ŠĶÄő£‚ĀĽ¬Ļőľ, B = őľŠĶÄő£‚ĀĽ¬Ļőľ,
# C = 1ŠĶÄő£‚ĀĽ¬Ļ1, D = BC ‚ąí A¬≤. The target proves 0 < C ‚ąß 0 < B ‚ąß 0 < D. The source statement advertises
# C > 0 and D > 0; B > 0 is a source-supported proof-body positivity fact. The dual-system
# uniqueness / Cramer's-rule consequence is deliberately split off (not part of this target).
# These mutants are source-fidelity focused: they do not ask the judge to prove Lean mathematics.

target: MarkowitzLemmaDPositive
real_statement_ref: markowitz_lemma_D_positive
lean_ambient: ""

formalisation_choices:
  - "the covariance is a symmetric positive-definite matrix S : Matrix (Fin n) (Fin n) ‚ĄĚ (hypothesis S.PosDef); S stands for ő£, which is a reserved token in Lean"
  - "the Gram scalars are A = 1 ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ), B = őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ), C = 1 ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• 1), and the discriminant D = B * C - A ^ 2, all via the inverse matrix S‚ĀĽ¬Ļ"
  - "the non-degeneracy hypothesis is that őľ is not a scalar multiple of the all-ones vector 1, written ¬¨ ‚ąÉ c, őľ = c ‚ÄĘ 1"
  - "the conclusion is the three strict positivity facts 0 < C, 0 < B, 0 < D; the dual-system uniqueness / Cramer's-rule consequence is deliberately not part of this target"
  - "[Nonempty (Fin n)] encodes the finite dimension n > 0, so the all-ones vector 1 is nonzero"

real_statement: |
  theorem markowitz_lemma_D_positive {n : ‚Ąē} [Nonempty (Fin n)]
      (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.PosDef) (őľ : Fin n ‚Üí ‚ĄĚ)
      (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
      let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
      let B := őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
      let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
      let D := B * C - A ^ 2;
      0 < C ‚ąß 0 < B ‚ąß 0 < D

mutants:
  # ---------------- Discriminative (judge must REJECT) ----------------
  - id: MLDP-D1
    class: discriminative
    operator: drop-hypothesis
    expected_verdict: FAIL
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.PosDef) (őľ : Fin n ‚Üí ‚ĄĚ) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let B := őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := B * C - A ^ 2;
          0 < C ‚ąß 0 < B ‚ąß 0 < D
    note: "the non-degeneracy hypothesis (őľ not proportional to 1) is dropped; without it őľ may be a multiple of 1, giving A¬≤ = BC (Cauchy-Schwarz equality) so D = BC - A¬≤ = 0 and 0 < D is false"

  - id: MLDP-D2
    class: discriminative
    operator: alter-formula
    expected_verdict: FAIL
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.PosDef) (őľ : Fin n ‚Üí ‚ĄĚ)
          (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let B := őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := A ^ 2 - B * C;
          0 < C ‚ąß 0 < B ‚ąß 0 < D
    note: "the discriminant is sign-flipped to D := A¬≤ - BC instead of BC - A¬≤; since BC > A¬≤ under the hypotheses this D is negative, so 0 < D is false (the source defines D = BC - A¬≤)"

  - id: MLDP-D3
    class: discriminative
    operator: weaken-hypothesis
    expected_verdict: FAIL
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.IsSymm) (őľ : Fin n ‚Üí ‚ĄĚ)
          (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let B := őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := B * C - A ^ 2;
          0 < C ‚ąß 0 < B ‚ąß 0 < D
    note: "positive-definiteness S.PosDef is weakened to mere symmetry S.IsSymm; a symmetric but non-positive-definite (or singular) S makes S‚ĀĽ¬Ļ fail to be positive definite, so 0 < C, 0 < B, 0 < D no longer hold"

  - id: MLDP-D4
    class: discriminative
    operator: strengthen-conclusion
    expected_verdict: FAIL
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.PosDef) (őľ : Fin n ‚Üí ‚ĄĚ)
          (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let B := őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := B * C - A ^ 2;
          0 < C ‚ąß 0 < B ‚ąß 0 < D ‚ąß
            ‚ąÄ m : ‚ĄĚ, ‚ąÉ! lg : ‚ĄĚ √ó ‚ĄĚ, lg.1 * D = C * m - A ‚ąß lg.2 * D = B - A * m
    note: "augments the positivity conclusion with the dual-system uniqueness/Cramer's-rule consequence (a unique (őĽ,ő≥) for every m); this target deliberately covers positivity ONLY and the Lean theorem proves no uniqueness, so the candidate claims strictly more than the target formalises"

  - id: MLDP-D5
    class: discriminative
    operator: invent-claim
    expected_verdict: FAIL
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.PosDef) (őľ : Fin n ‚Üí ‚ĄĚ)
          (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let B := őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := B * C - A ^ 2;
          0 < C ‚ąß 0 < B ‚ąß 0 < D ‚ąß 0 < A
    note: "adds 0 < A (A = 1ŠĶÄS‚ĀĽ¬Ļőľ) as a further positivity fact; unlike B > 0 ‚ÄĒ which the source proof explicitly establishes ‚ÄĒ the sign of A is not determined by the hypotheses and A can be negative, so 0 < A is an invented, false strengthening"

  # ---------------- Consistency (judge must ACCEPT) ----------------
  - id: MLDP-C1
    class: consistency
    operator: rename-variables
    expected_verdict: PASS
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (M : Matrix (Fin n) (Fin n) ‚ĄĚ) (hM : M.PosDef) (v : Fin n ‚Üí ‚ĄĚ)
          (hv : ¬¨ ‚ąÉ c : ‚ĄĚ, v = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (M‚ĀĽ¬Ļ *ŠĶ• v);
          let B := v ‚¨ĚŠĶ• (M‚ĀĽ¬Ļ *ŠĶ• v);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (M‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := B * C - A ^ 2;
          0 < C ‚ąß 0 < B ‚ąß 0 < D
    note: "the covariance S is renamed to M and the mean őľ to v (with hypotheses renamed to match); identical statement up to renaming"

