    operator: notation-variant
    expected_verdict: PASS
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.PosDef) (őľ : Fin n ‚Üí ‚ĄĚ)
          (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
          let A := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ);
          let C := (1 : Fin n ‚Üí ‚ĄĚ) ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• (1 : Fin n ‚Üí ‚ĄĚ));
          let D := (őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ)) * C - A ^ 2;
          0 < C ‚ąß 0 < (őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ)) ‚ąß 0 < D
    note: "B is inlined to its definition őľ ‚¨ĚŠĶ• (S‚ĀĽ¬Ļ *ŠĶ• őľ) in the middle conjunct and in D; B > 0 is the source-supported proof-body positivity fact and the statement is unchanged"

  - id: MLDP-C4
    class: consistency
    operator: notation-variant
    expected_verdict: PASS
    mutated_statement: |
      theorem candidate_statement {n : ‚Ąē} [Nonempty (Fin n)]
          (S : Matrix (Fin n) (Fin n) ‚ĄĚ) (hS : S.PosDef) (őľ : Fin n ‚Üí ‚ĄĚ)
          (hőľ : ¬¨ ‚ąÉ c : ‚ĄĚ, őľ = c ‚ÄĘ (1 : Fin n ‚Üí ‚ĄĚ)) :
