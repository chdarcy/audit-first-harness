# Source <-> Lean bridge for the audit-first harness (example instance).
#
# Links source claims (keys into docs/theorem_index.yaml) to Lean declarations and to
# their Comparator audit triples. It carries the lifecycle state, the fidelity verdict, and
# the human-approval flag, but NO mathematics (that is in theorem_index.yaml) and NO prose
# judgment (that is in docs/fidelity_reviews/<target>.md).
#
# `comparator_status` is recorded by a human/pipeline after a Comparator run; it is NOT
# re-derived by validate_mapping.py. See docs/templates/mapping.template.yaml.

version: "0.1"

# Axioms permitted by every audit triple (see Audit/<T>/comparator.json).
permitted_axioms: [propext, Quot.sound, Classical.choice]

targets:

  PutCallParity:
    source_refs: ["thm:putcall"]
    lean:
      declaration: put_call_payoff_parity
      module: AuditHarness.PutCallParity
      fully_qualified: AuditHarness.put_call_payoff_parity
    comparator:
      dir: Audit/PutCallParity
      config: Audit/PutCallParity/comparator.json
      challenge_module: Audit.PutCallParity.Challenge
      solution_module: Audit.PutCallParity.Solution
      audit_theorem: AuditHarness.StatementAudit.put_call_payoff_parity
    verdict: PASS
    # equivalence: provable-equivalence evidence (see PROJECT_CONTEXT.md,
    # scripts/check_equivalence.py). `null` or kind=direct when the Lean statement matches the
    # source directly (verdict PASS). For verdict PASS_PROVABLE_EQUIV this MUST be a built lemma:
    #   equivalence:
    #     kind: provable_equiv
    #     lemma: AuditHarness.some_equivalence_lemma
    #     module: AuditHarness.SomeModule
    #     notes: "why the Lean form is equivalent to the source"
    # (PASS_EQUIV may carry an informal equivalence.direction/notes but no built lemma.)
    equivalence: null
    # Set by a human after a Comparator run (automatic writeback is a v0.2 task).
    # One of (see PROJECT_CONTEXT.md):
    #   NOT_RUN | PASSED_REAL_LANDRUN | PASSED_REAL_LANDRUN_BEST_EFFORT |
    #   PASSED_FAKE_LANDRUN | SKIPPED_COMPARATOR_TOOL_UNAVAILABLE | FAILED_COMPARATOR
    comparator_status: PASSED_REAL_LANDRUN_BEST_EFFORT
    review: docs/fidelity_reviews/PutCallParity.md
    state: HUMAN_APPROVED
    human_approved: true

  TwoAssetMinVar:
    source_refs: ["thm:two_asset_minvar"]
    lean:
      declaration: two_asset_min_variance_weight
      module: AuditHarness.TwoAssetMinVar
      fully_qualified: AuditHarness.two_asset_min_variance_weight
    comparator:
      dir: Audit/TwoAssetMinVar
      config: Audit/TwoAssetMinVar/comparator.json
      challenge_module: Audit.TwoAssetMinVar.Challenge
      solution_module: Audit.TwoAssetMinVar.Solution
      audit_theorem: AuditHarness.StatementAudit.two_asset_min_variance_weight
    # Direct PASS: the Lean statement matches the source claim term-for-term (equivalence
    # null / kind=direct). comparator_status records the latest real Comparator writeback result —
    # formal Challenge/Solution evidence only, not source-fidelity.
    verdict: PASS
    equivalence: null
    comparator_status: PASSED_REAL_LANDRUN_BEST_EFFORT
    review: docs/fidelity_reviews/TwoAssetMinVar.md
    state: HUMAN_APPROVED
    human_approved: true

  GoldIrrationalSqrtTwo:
    source_refs: ["thm:gold_irrational_sqrt_two"]
    lean:
      declaration: gold_irrational_sqrt_two
      module: AuditHarness.GoldIrrationalSqrtTwo
      fully_qualified: AuditHarness.gold_irrational_sqrt_two
    comparator:
      dir: Audit/GoldIrrationalSqrtTwo
      config: Audit/GoldIrrationalSqrtTwo/comparator.json
      challenge_module: Audit.GoldIrrationalSqrtTwo.Challenge
      solution_module: Audit.GoldIrrationalSqrtTwo.Solution
      audit_theorem: AuditHarness.StatementAudit.gold_irrational_sqrt_two
    # Public gold-reference target: a thin wrapper around Mathlib's `irrational_sqrt_two`.
    # Direct PASS (Lean statement = source claim). comparator_status records the latest real
    # Comparator writeback result — formal Challenge/Solution evidence only, not source-fidelity.
    verdict: PASS
    equivalence: null
    comparator_status: PASSED_REAL_LANDRUN_BEST_EFFORT
    review: docs/fidelity_reviews/GoldIrrationalSqrtTwo.md
    state: HUMAN_APPROVED
    human_approved: true

  MarkowitzLemmaDPositive:
    source_refs: ["thm:markowitz_lemma_d_positive"]
    lean:
      declaration: markowitz_lemma_D_positive
      module: AuditHarness.MarkowitzLemmaDPositive
      fully_qualified: AuditHarness.markowitz_lemma_D_positive
    comparator:
      dir: Audit/MarkowitzLemmaDPositive
      config: Audit/MarkowitzLemmaDPositive/comparator.json
      challenge_module: Audit.MarkowitzLemmaDPositive.Challenge
      solution_module: Audit.MarkowitzLemmaDPositive.Solution
      audit_theorem: AuditHarness.StatementAudit.markowitz_lemma_D_positive
    # Human source-fidelity review approved as PASS with note. The source LaTeX label is `lem:D`;
    # `thm:markowitz_lemma_d_positive` is the internal theorem-index key. The Lean conclusion includes
    # `B > 0` in addition to the lemma headline's `C > 0` and `D > 0`; this is accepted because
    # `B > 0` is explicitly established in the source proof under the same hypotheses. The Lean theorem
    # is fully PROVED and axiom-audited ([propext, Quot.sound, Classical.choice]; no sorryAx). The real
    # Comparator has now been run on WSL/Linux (real landrun sandbox, --best-effort; kernel 6.6 Landlock
    # ABI < 5) and the Lean default kernel ACCEPTS the solution ("Your solution is okay!"); Challenge and
    # Solution export the same theorem within the permitted axioms. Recorded conservatively as
    # PASSED_REAL_LANDRUN_BEST_EFFORT (consistent with the other targets).
    #
    # Promotion gate returned HUMAN_REVIEW because the calibrated judge produced false alarms on
    # meaning-preserving consistency variants (consistency false-alarm / false-rejection rate 0.6).
    # Human reviewer Christopher Darcy reviewed the cap and approved promotion: the real mapping was
    # accepted as PASS, discriminative recall was 1.0, and all formal/source-fidelity evidence is
    # already satisfied (Lean build, no-sorry, axiom audit, human-approved fidelity review, and real
    # Comparator pass recorded as PASSED_REAL_LANDRUN_BEST_EFFORT). The override is a judgement-layer
    # override only; it does not override Lean, source fidelity, axiom audit, or Comparator.
    verdict: PASS
    equivalence: null
    comparator_status: PASSED_REAL_LANDRUN_BEST_EFFORT
    review: docs/fidelity_reviews/MarkowitzLemmaDPositive.md
    state: HUMAN_APPROVED
    human_approved: true
    human_override: true
    promotion_state: PROMOTED_WITH_HUMAN_REVIEW
