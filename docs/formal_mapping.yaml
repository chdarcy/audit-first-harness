# Source <-> Lean bridge for the audit-first harness (example instance).
#
# Links source claims (keys into docs/theorem_index.yaml) to Lean declarations and to
# their Comparator audit triples. It carries the lifecycle state, the fidelity verdict, and
# the human-approval flag, but NO mathematics (that is in theorem_index.yaml) and NO prose
# judgment (that is in docs/fidelity_reviews/<target>.md).
#
# `comparator_status` is recorded by a human/pipeline after a Comparator run; it is NOT
# re-derived by validate_mapping.py. See docs/templates/mapping.template.yaml.

version: "0.1"

# Axioms permitted by every audit triple (see Audit/<T>/comparator.json).
permitted_axioms: [propext, Quot.sound, Classical.choice]

targets:

  PutCallParity:
    source_refs: ["thm:putcall"]
    lean:
      declaration: put_call_payoff_parity
      module: AuditHarness.PutCallParity
      fully_qualified: AuditHarness.put_call_payoff_parity
    comparator:
      dir: Audit/PutCallParity
      config: Audit/PutCallParity/comparator.json
      challenge_module: Audit.PutCallParity.Challenge
      solution_module: Audit.PutCallParity.Solution
      audit_theorem: AuditHarness.StatementAudit.put_call_payoff_parity
    verdict: PASS
    # equivalence: provable-equivalence evidence (see ARCHITECTURE.md §20.6,
    # scripts/check_equivalence.py). `null` or kind=direct when the Lean statement matches the
    # source directly (verdict PASS). For verdict PASS_PROVABLE_EQUIV this MUST be a built lemma:
    #   equivalence:
    #     kind: provable_equiv
    #     lemma: AuditHarness.some_equivalence_lemma
    #     module: AuditHarness.SomeModule
    #     notes: "why the Lean form is equivalent to the source"
    # (PASS_EQUIV may carry an informal equivalence.direction/notes but no built lemma.)
    equivalence: null
    # Set by a human after a Comparator run (automatic writeback is a v0.2 task).
    # One of (see ARCHITECTURE.md §13.4):
    #   NOT_RUN | PASSED_REAL_LANDRUN | PASSED_REAL_LANDRUN_BEST_EFFORT |
    #   PASSED_FAKE_LANDRUN | SKIPPED_COMPARATOR_TOOL_UNAVAILABLE | FAILED_COMPARATOR
    comparator_status: NOT_RUN
    review: docs/fidelity_reviews/PutCallParity.md
    state: HUMAN_APPROVED
    human_approved: true

  TwoAssetMinVar:
    source_refs: ["thm:two_asset_minvar"]
    lean:
      declaration: two_asset_min_variance_weight
      module: AuditHarness.TwoAssetMinVar
      fully_qualified: AuditHarness.two_asset_min_variance_weight
    comparator:
      dir: Audit/TwoAssetMinVar
      config: Audit/TwoAssetMinVar/comparator.json
      challenge_module: Audit.TwoAssetMinVar.Challenge
      solution_module: Audit.TwoAssetMinVar.Solution
      audit_theorem: AuditHarness.StatementAudit.two_asset_min_variance_weight
    # Direct PASS: the Lean statement matches the source claim term-for-term (equivalence
    # null / kind=direct). comparator_status stays NOT_RUN until a real Comparator writeback.
    verdict: PASS
    equivalence: null
    comparator_status: NOT_RUN
    review: docs/fidelity_reviews/TwoAssetMinVar.md
    state: HUMAN_APPROVED
    human_approved: true
