package:
  variant: V-0014
  instructions: Compare the source claim to the Lean statement and output the verdict YAML defined in
    the system prompt. Judge this package in isolation.
  source:
    refs:
    - thm:markowitz_lemma_d_positive
    claims:
    - ref: thm:markowitz_lemma_d_positive
      paraphrase: For a real symmetric positive-definite matrix Sigma in R^{n x n} (with n finite and
        n > 0) and vectors mu, 1 in R^n where mu is not a scalar multiple of the ones vector 1, the source
        defines A = 1^T Sigma^{-1} mu, B = mu^T Sigma^{-1} mu, C = 1^T Sigma^{-1} 1, and D = BC - A^2.
        For the planned MK-003 target we surface C > 0, B > 0, and D > 0 (all strict). The source Lemma
        D statement advertises C > 0 and D > 0; B > 0 appears in the proof and is recorded as a proof
        subclaim / reusable positivity fact in the source-formalisation record.
      body_tex: 'Let $D := BC - A^2$. Under Assumption~\ref{ass:nondeg} we have $C > 0$ and

        $D > 0$. In particular the linear system in Theorem~\ref{thm:frontier} has a

        unique solution

        \[

        \lambda = \frac{Cm - A}{D}, \qquad \gamma = \frac{B - Am}{D}.

        \]'
      informal_assumptions:
      - Sigma is a real symmetric positive-definite n x n matrix (n finite, n > 0)
      - mu is not proportional to the ones vector 1 (since 0 is proportional to every vector, this gives
        mu != 0)
      - the ones vector 1 is nonzero (a consequence of n > 0)
      - scalars are real; Sigma^{-1} exists and is symmetric positive definite
  lean:
    ambient: ''
    statement: "theorem candidate_statement {n : ℕ} [Nonempty (Fin n)]\n    (M : Matrix (Fin n) (Fin n)\
      \ ℝ) (hM : M.PosDef) (v : Fin n → ℝ)\n    (hv : ¬ ∃ c : ℝ, v = c • (1 : Fin n → ℝ)) :\n    let A\
      \ := (1 : Fin n → ℝ) ⬝ᵥ (M⁻¹ *ᵥ v);\n    let B := v ⬝ᵥ (M⁻¹ *ᵥ v);\n    let C := (1 : Fin n → ℝ)\
      \ ⬝ᵥ (M⁻¹ *ᵥ (1 : Fin n → ℝ));\n    let D := B * C - A ^ 2;\n    0 < C ∧ 0 < B ∧ 0 < D"
  formalisation_choices:
  - 'the covariance is a symmetric positive-definite matrix S : Matrix (Fin n) (Fin n) ℝ (hypothesis S.PosDef);
    S stands for Σ, which is a reserved token in Lean'
  - the Gram scalars are A = 1 ⬝ᵥ (S⁻¹ *ᵥ μ), B = μ ⬝ᵥ (S⁻¹ *ᵥ μ), C = 1 ⬝ᵥ (S⁻¹ *ᵥ 1), and the discriminant
    D = B * C - A ^ 2, all via the inverse matrix S⁻¹
  - the non-degeneracy hypothesis is that μ is not a scalar multiple of the all-ones vector 1, written
    ¬ ∃ c, μ = c • 1
  - the conclusion is the three strict positivity facts 0 < C, 0 < B, 0 < D; the dual-system uniqueness
    / Cramer's-rule consequence is deliberately not part of this target
  - '[Nonempty (Fin n)] encodes the finite dimension n > 0, so the all-ones vector 1 is nonzero'
  provable_equiv_lemma: null
