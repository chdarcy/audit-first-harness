package:
  variant: V-0001
  instructions: Compare the source claim to the Lean statement and output the verdict YAML defined in
    the system prompt. Judge this package in isolation.
  source:
    refs:
    - thm:two_asset_minvar
    claims:
    - ref: thm:two_asset_minvar
      paraphrase: For two risky assets with variance parameters sigma1Sq, sigma2Sq and covariance sigma12,
        the portfolio variance V(w) = w^2 sigma1Sq + (1-w)^2 sigma2Sq + 2 w (1-w) sigma12 is minimized
        over ALL real weights w at w* = (sigma2Sq - sigma12) / (sigma1Sq + sigma2Sq - 2 sigma12), provided
        the quadratic coefficient sigma1Sq + sigma2Sq - 2 sigma12 is positive. The conclusion is the non-strict
        global inequality V(w*) <= V(w) for every real w; uniqueness is not claimed.
      body_tex: 'V(w) = w^2 \sigma_1^2 + (1-w)^2 \sigma_2^2 + 2 w (1-w) \sigma_{12},\quad

        w^\ast = \frac{\sigma_2^2 - \sigma_{12}}{\sigma_1^2 + \sigma_2^2 - 2\sigma_{12}},\quad

        \sigma_1^2 + \sigma_2^2 - 2\sigma_{12} > 0

        \;\Rightarrow\; \forall w \in \mathbb{R},\ V(w^\ast) \le V(w).'
      informal_assumptions:
      - sigma1Sq, sigma2Sq, sigma12 are real parameters
      - the quadratic coefficient sigma1Sq + sigma2Sq - 2 sigma12 is strictly positive (the only hypothesis)
      - no separate sigma1Sq > 0 / sigma2Sq > 0 positivity is required for the inequality
      - the minimisation domain is ALL real weights w, not a long-only 0 <= w <= 1 constraint
  lean:
    ambient: "def twoAssetVariance (sigma1Sq sigma2Sq sigma12 w : ℝ) : ℝ :=\n  w ^ 2 * sigma1Sq + (1 -\
      \ w) ^ 2 * sigma2Sq + 2 * w * (1 - w) * sigma12\n"
    statement: "theorem candidate_statement\n    (a b c : ℝ)\n    (hpos : 0 < a + b - 2 * c) :\n    ∀\
      \ x : ℝ,\n      twoAssetVariance a b c ((b - c) / (a + b - 2 * c))\n        ≤ twoAssetVariance a\
      \ b c x"
  formalisation_choices:
  - portfolio variance V(w) = twoAssetVariance sigma1Sq sigma2Sq sigma12 w (see lean_ambient)
  - the minimiser is the closed form w* = (sigma2Sq - sigma12) / (sigma1Sq + sigma2Sq - 2*sigma12)
  - 'domain is all real weights w : ℝ (no long-only constraint)'
  - conclusion is non-strict global minimality V(w*) ≤ V(w); the only hypothesis is denom > 0
  provable_equiv_lemma: null
