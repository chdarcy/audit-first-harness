name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  harness-checks:
    # Fast, model-free pipeline checks (no Lean build, no Comparator).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pyyaml
      - name: Judge-output parser unit tests
        run: python scripts/test_judge_parsing.py
      - name: Promotion-gate decision unit tests
        run: python scripts/test_gate_decision.py
      - name: Pipeline --target unit tests
        run: python scripts/test_rebuild_pipeline.py
      - name: Axiom-audit parser unit tests
        run: python scripts/test_check_axioms.py
      - name: Provable-equivalence unit tests
        run: python scripts/test_check_equivalence.py
      - name: Structured judge-schema validator unit tests
        run: python scripts/test_validate_judge_schema.py
      - name: Structured judge-scoring unit tests
        run: python scripts/test_score_judge.py
      - name: Validate ledger (cards <-> mapping <-> reviews)
        run: python scripts/validate_mapping.py
      - name: Assemble blinded judge packages (dry-run, no model)
        run: python scripts/run_mutants.py --dry-run
      - name: No incomplete proofs (sorry/admit)
        run: python scripts/check_sorries.py
      - name: Pipeline report (build + comparator stages gated/skipped)
        run: python scripts/rebuild_pipeline.py

  lean-build:
    # Full Lean build of the example library + Audit triples.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build-args: "AuditHarness Audit.PutCallParity.Challenge Audit.PutCallParity.Solution"
