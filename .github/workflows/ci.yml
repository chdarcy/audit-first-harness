name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  harness-checks:
    # Fast, model-free pipeline checks (no Lean build, no Comparator).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pyyaml
      - name: Judge-output parser unit tests
        run: python scripts/test_judge_parsing.py
      - name: Promotion-gate decision unit tests
        run: python scripts/test_gate_decision.py
      - name: Structured pipeline-status unit tests
        run: python scripts/test_pipeline_status.py
      - name: Pipeline --target unit tests
        run: python scripts/test_rebuild_pipeline.py
      - name: Axiom-audit parser unit tests
        run: python scripts/test_check_axioms.py
      - name: Provable-equivalence unit tests
        run: python scripts/test_check_equivalence.py
      - name: Structured judge-schema validator unit tests
        run: python scripts/test_validate_judge_schema.py
      - name: Structured judge-scoring unit tests
        run: python scripts/test_score_judge.py
      - name: Structured judge-output export unit tests
        run: python scripts/test_structured_judge_output.py
      - name: Structured judge-workflow runner unit tests
        run: python scripts/test_structured_judge_workflow.py
      - name: Validate ledger (cards <-> mapping <-> reviews)
        run: python scripts/validate_mapping.py
      - name: Assemble blinded judge packages (dry-run, no model)
        run: python scripts/run_mutants.py --dry-run
      - name: No incomplete proofs (sorry/admit)
        run: python scripts/check_sorries.py
      - name: Pipeline report (build + comparator stages gated/skipped)
        run: python scripts/rebuild_pipeline.py

  lean-build:
    # Formal Lean layer for ALL current targets: build every theorem module + every
    # Challenge/Solution triple, then run the kernel/axiom audit and the provable-equivalence
    # audit. The real Comparator (landrun sandbox + comparator/lean4export binaries) is NOT run
    # here — those tools are not installed in CI; Comparator execution and comparator_status
    # writeback stay local/WSL. CI therefore proves the triples *build*, not that the Comparator
    # accepts them. Formal evidence only — this does not establish source fidelity.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pyyaml
      - name: Build theorem modules + all Challenge/Solution triples (all targets)
        uses: leanprover/lean-action@v1
        with:
          build-args: >-
            AuditHarness.PutCallParity AuditHarness.TwoAssetMinVar AuditHarness.GoldIrrationalSqrtTwo
            Audit.PutCallParity.Challenge Audit.PutCallParity.Solution
            Audit.TwoAssetMinVar.Challenge Audit.TwoAssetMinVar.Solution
            Audit.GoldIrrationalSqrtTwo.Challenge Audit.GoldIrrationalSqrtTwo.Solution
      - name: Kernel/axiom audit — mapped declarations within permitted axioms (all targets)
        run: python scripts/check_axioms.py
      - name: Provable-equivalence audit (NOT_REQUIRED where equivalence is null; no targets yet)
        run: python scripts/check_equivalence.py
